# Development docker-compose file
version: '3.7'
services:
  react-app:
    environment:
      - HTTPS=true
      - REACT_APP_API_URL=https://portfolio.dev.topher.la:8080
    build:
      context: ./
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"